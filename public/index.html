<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arda's AI Construct</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=9">
</head>
<body data-theme="dark">
    <div id="app">
        <!-- Header -->
        <header id="header">
            <div class="header-left">
                <h1 data-i18n="header-title">Arda's AI Construct</h1>
            </div>
            <div class="header-right">
                <button type="button" class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme" title="Toggle theme">
                    <!-- Moon icon (dark mode) -->
                    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                    <!-- Sun icon (light mode) -->
                    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <!-- Dracula icon (dracula mode) -->
                    <svg class="icon-dracula" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
                        <path d="M8 14l2-4 2 4"/>
                        <path d="M12 14l2-4 2 4"/>
                    </svg>
                </button>
                <div class="language-toggle">
                    <span class="toggle-label">EN</span>
                    <label class="switch" aria-label="Toggle language between English and Japanese">
                        <input type="checkbox" id="lang-toggle" onchange="toggleLanguage()" aria-label="Switch to Japanese">
                        <span class="slider"></span>
                    </label>
                    <span class="toggle-label">JP</span>
                </div>
            </div>
        </header>

        <!-- Main Chat Area -->
        <main id="chat-area">
            <div id="messages-container">
                <div id="messages"></div>
            </div>

            <!-- Welcome Screen (shown when no messages) -->
            <div id="welcome-screen">
                <div class="welcome-icon">
                    <!-- Terminal window icon -->
                    <svg width="44" height="44" viewBox="0 0 44 44" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="6" width="40" height="32" rx="4" ry="4"/>
                        <line x1="2" y1="14" x2="42" y2="14"/>
                        <circle cx="8" cy="10" r="1.5" fill="currentColor" stroke="none"/>
                        <circle cx="13" cy="10" r="1.5" fill="currentColor" stroke="none"/>
                        <circle cx="18" cy="10" r="1.5" fill="currentColor" stroke="none"/>
                        <path d="M10 23l5 4-5 4"/>
                        <line x1="19" y1="31" x2="32" y2="31"/>
                    </svg>
                </div>
                <h2 data-i18n="welcome-title">Hi, I'm Arda's AI Assistant</h2>
                <p data-i18n="welcome-subtitle">Ask me anything about Arda's experience, skills, or background.</p>
            </div>

            <!-- Quick Topic Buttons -->
            <div id="quick-topics">
                <button type="button" class="topic-btn" onclick="sendQuickPrompt('experience')">
                    <span class="topic-icon">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
                            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
                        </svg>
                    </span>
                    <span data-i18n="btn-experience">Experience</span>
                </button>
                <button type="button" class="topic-btn" onclick="sendQuickPrompt('education')">
                    <span class="topic-icon">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                            <path d="M6 12v5c3 3 9 3 12 0v-5"/>
                        </svg>
                    </span>
                    <span data-i18n="btn-education">Education</span>
                </button>
                <button type="button" class="topic-btn" onclick="sendQuickPrompt('skills')">
                    <span class="topic-icon">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="16 18 22 12 16 6"/>
                            <polyline points="8 6 2 12 8 18"/>
                        </svg>
                    </span>
                    <span data-i18n="btn-skills">Skills</span>
                </button>
                <button type="button" class="topic-btn" onclick="sendQuickPrompt('visa')">
                    <span class="topic-icon">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                    </span>
                    <span data-i18n="btn-visa">Visa Status</span>
                </button>
                <button type="button" class="topic-btn" onclick="sendQuickPrompt('about_bot')">
                    <span class="topic-icon">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="16" x2="12" y2="12"/>
                            <line x1="12" y1="8" x2="12.01" y2="8"/>
                        </svg>
                    </span>
                    <span data-i18n="btn-about-bot">About this Bot</span>
                </button>
            </div>
        </main>

        <!-- Input Area -->
        <footer id="input-footer">
            <div id="input-wrapper">
                <input type="text" id="user-input" placeholder="Message Arda's AI..." autofocus data-i18n="input-placeholder">
                <button type="button" id="send-btn" onclick="sendMessage()" aria-label="Send message">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
            <p class="input-hint">Arda's AI can make mistakes. Consider verifying important information.</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <script src="script.js?v=8"></script>
</body>
</html>
