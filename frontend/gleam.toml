name = "frontend"
version = "1.0.0"
target = "javascript"

[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
gleam_json = ">= 3.0.0 and < 4.0.0"
lustre = ">= 5.0.0 and < 6.0.0"
rsvp = ">= 1.0.0 and < 2.0.0"
shared = { path = "../shared" }

[dev_dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
lustre_dev_tools = ">= 1.0.0 and < 3.0.0"

[tools.lustre.build]
minify = true
outdir = "../public"

[tools.lustre.dev]
proxy = { from = "/api", to = "http://localhost:8080/api" }

[tools.lustre.html]
lang = "en"
title = "Arda's AI Construct"
meta = [
  { name = "viewport", content = "width=device-width, initial-scale=1.0" },
  { name = "description", content = "An AI assistant that answers questions about Arda — his work, projects, and background." },
  { property = "og:type", content = "website" },
  { property = "og:site_name", content = "Arda's AI Construct" },
  { property = "og:url", content = "https://ai.arda.tr/" },
  { property = "og:title", content = "Arda's AI Construct" },
  { property = "og:description", content = "An AI assistant that answers questions about Arda — his work, projects, and background." },
  { property = "og:image", content = "https://ai.arda.tr/og-image.png" },
  { property = "og:image:width", content = "1200" },
  { property = "og:image:height", content = "630" },
  { property = "og:image:type", content = "image/png" },
  { property = "og:image:alt", content = "Arda's AI Construct — an AI assistant that answers questions about Arda." },
  { name = "twitter:card", content = "summary_large_image" },
  { name = "twitter:title", content = "Arda's AI Construct" },
  { name = "twitter:description", content = "An AI assistant that answers questions about Arda." },
  { name = "twitter:image", content = "https://ai.arda.tr/og-image.png" },
]
stylesheets = [
  { href = "https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" },
  { href = "/style.css?v=14" },
]
scripts = [
  # Vendored under public/vendor/ (marked 18.0.5, DOMPurify 3.4.8) — pinned and
  # served same-origin, so there is no CDN supply-chain/availability risk and
  # no need for SRI (which Lustre's html config can't express on scripts anyway).
  { src = "/vendor/marked.min.js" },
  { src = "/vendor/purify.min.js" },
  { content = "var _c=document.createElement('link');_c.rel='canonical';_c.href='https://ai.arda.tr/';document.head.appendChild(_c);var _f=document.createElement('link');_f.rel='icon';_f.type='image/svg+xml';_f.href='/favicon.svg';document.head.appendChild(_f);document.addEventListener('DOMContentLoaded',function(){document.body.setAttribute('data-theme',localStorage.getItem('theme')||'light');});" },
]
# The CF Web Analytics beacon lives in `body` (raw HTML) because Lustre's
# `scripts` config can't express the required data-cf-beacon attribute.
body = "<div id=\"app\"></div><!-- Cloudflare Web Analytics --><script defer src=\"https://static.cloudflareinsights.com/beacon.min.js\" data-cf-beacon='{\"token\": \"ec0a808ebf6b4be7b59a63377cbeff3a\"}'></script><!-- End Cloudflare Web Analytics -->"
