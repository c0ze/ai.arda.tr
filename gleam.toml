name = "ai_resume_bot"
version = "0.1.0"
description = "Gleam rewrite of the ai.arda.tr resume chatbot backend."
licences = ["MIT"]
target = "erlang"

[dependencies]
gleam_stdlib = ">= 0.60.0 and < 2.0.0"
gleam_http = ">= 4.0.0 and < 5.0.0"
gleam_httpc = ">= 5.0.0 and < 6.0.0"
gleam_json = ">= 3.0.0 and < 4.0.0"
gleam_erlang = ">= 1.0.0 and < 2.0.0"
wisp = ">= 2.2.0 and < 3.0.0"
mist = ">= 5.0.0 and < 7.0.0"
glisten = ">= 9.0.0 and < 10.0.0"
envoy = ">= 1.0.0 and < 2.0.0"
simplifile = ">= 2.0.0 and < 3.0.0"
logging = ">= 1.3.0 and < 2.0.0"
argv = ">= 1.0.0 and < 2.0.0"
gen_smtp = ">= 1.3.0 and < 2.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
