name: Deploy UI to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install the Erlang + Gleam toolchain to build the Lustre frontend.
      - name: Setup Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28.0"
          gleam-version: "1.15.2"
          rebar3-version: "3"

      - name: Build Lustre frontend
        working-directory: frontend
        run: |
          gleam deps download
          gleam run -m lustre/dev build --minify --outdir=../public

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
