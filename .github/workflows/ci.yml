name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Least privilege: CI only needs to read the repository.
permissions:
  contents: read

jobs:
  backend:
    name: Backend (format, build, test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Erlang/OTP + Gleam
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1
        with:
          otp-version: "28.0"
          gleam-version: "1.15.2"
          rebar3-version: "3"

      - name: Check formatting
        run: gleam format --check src test shared/src

      - name: Download dependencies
        run: gleam deps download

      - name: Build
        run: gleam build

      - name: Test
        run: gleam test

  frontend:
    name: Frontend (format, build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Erlang/OTP + Gleam
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1
        with:
          otp-version: "28.0"
          gleam-version: "1.15.2"
          rebar3-version: "3"

      - name: Check formatting
        working-directory: frontend
        run: gleam format --check src

      - name: Download dependencies
        working-directory: frontend
        run: gleam deps download

      - name: Build Lustre bundle
        working-directory: frontend
        run: gleam run -m lustre/dev build --minify --outdir=../public
