name: Deploy Backend to Cloud Run

# Auto-deploys on push to main when backend-relevant files change. Frontend /
# docs-only changes do not trigger a backend redeploy (the frontend ships to
# GitHub Pages via deploy-ui.yml). Manual runs are still available.
on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'src/**'
      - 'shared/src/**'
      - 'shared/gleam.toml'
      - 'shared/manifest.toml'
      - 'gleam.toml'
      - 'manifest.toml'
      - 'personal.md'
      - 'job_requirements.md'
      - '.github/workflows/deploy-backend.yml'
  # Fired by c0ze/resume (via repository_dispatch) when the résumé content
  # changes, so the bot re-fetches the latest résumé at build time. See
  # DEPLOYMENT_OPTIONS.md → "Auto-refresh on résumé changes".
  repository_dispatch:
    types: [resume-updated]
  workflow_dispatch:

permissions:
  contents: 'read'
  id-token: 'write'

# Serialize backend deploys: merging PRs back-to-back would otherwise spawn
# concurrent `gcloud run deploy` runs that race, and with build caching an
# older commit's run can finish last and serve a stale image. cancel-in-progress
# means the newest commit wins (mirrors deploy-ui.yml's Pages concurrency).
concurrency:
  group: deploy-backend
  cancel-in-progress: true

# Opt JavaScript actions into Node 24 ahead of GitHub's June 2026 default
# (keeps the SHA pins below; just changes the runtime).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # Keyless auth via Workload Identity Federation — no JSON keys in GitHub.
      # Required secrets: GCP_WIF_PROVIDER (full provider resource name),
      # GCP_SA_EMAIL. Create them once with scripts/setup-gcp-wif.sh.
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: '${{ secrets.GCP_WIF_PROVIDER }}'
          service_account: '${{ secrets.GCP_SA_EMAIL }}'

      # Build the image from the repo-root Dockerfile (via Cloud Build) and
      # deploy. Required secrets: GEMINI_API_KEY, ALLOWED_ORIGINS.
      # Optional: GMAIL_USER, GMAIL_APP_PASSWORD, CONTACT_ADDRESS.
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@251330ba9a8a34bfbc1622895f42e1d53fd14522 # v2
        with:
          service: 'ai-arda-tr-api'
          region: 'asia-northeast1'
          source: '.'
          env_vars: |
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}
            GMAIL_USER=${{ secrets.GMAIL_USER }}
            GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
            CONTACT_ADDRESS=${{ secrets.CONTACT_ADDRESS }}
          flags: '--allow-unauthenticated'
